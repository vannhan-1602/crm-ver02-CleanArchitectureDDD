spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/CRMOnline?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  web:
    resources:
      static-locations: file:./uploads/,classpath:/static/
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
server:
  port: 8081

crm:
  security:
    jwt-secret: crm-ver02-local-dev-secret-key-change-me-123456789
    jwt-expiration-ms: 86400000
